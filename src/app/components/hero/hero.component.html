<section class="hero">
  <div class="hero__inner">
    <div class="hero__content">
      <p class="hero__eyebrow">Personal Training</p>
      <h1 class="hero__headline">Train Harder.<br />Live Stronger.</h1>
      <p class="hero__subtext">
        Coaching built around you — never a template. Your plan is shaped to your
        fitness level, lifestyle, and goals, then refined session by session so
        progress keeps coming.
      </p>
      <div class="hero__actions">
        <a class="btn btn--primary" [routerLink]="['/apply']">Apply for Coaching</a>
        <a class="btn btn--outline" [routerLink]="[]" fragment="results">View Results</a>
      </div>
    </div>
    <div class="hero__image-wrapper">
      <div class="hero__image-placeholder">
        <span>Hero Image</span>
      </div>
    </div>
  </div>
</section>
